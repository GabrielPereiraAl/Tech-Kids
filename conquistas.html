<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conquistas - TechKids</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --amarelo: #FFD93D;
    --laranja: #FF6B35;
    --verde: #06D6A0;
    --azul: #118AB2;
    --roxo: #845EC2;
    --rosa: #FF6B9D;
    --fundo: #FFF9F0;
    --escuro: #1A1A2E;
    --card-shadow: 0 6px 0 rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Nunito', sans-serif; background: var(--fundo); color: var(--escuro); }

  nav {
    background: var(--escuro); padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 70px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 0 var(--amarelo);
  }
  .logo { font-family: 'Baloo 2', cursive; font-size: 1.8rem; font-weight: 800; color: var(--amarelo); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
  .logo span { color: var(--verde); }
  .nav-links { display: flex; gap: 0.5rem; }
  .nav-links a { color: white; text-decoration: none; font-weight: 700; padding: 0.4rem 1rem; border-radius: 20px; transition: all 0.2s; font-size: 0.95rem; }
  .nav-links a:hover { background: var(--amarelo); color: var(--escuro); }
  .nav-links a.active { background: var(--laranja); color: white; }

  .page-header {
    background: linear-gradient(135deg, var(--roxo), var(--rosa));
    color: white; text-align: center; padding: 3rem 2rem;
  }
  .page-header h1 { font-family: 'Baloo 2', cursive; font-size: 2.8rem; font-weight: 800; margin-bottom: 0.5rem; }
  .page-header p { font-size: 1.1rem; opacity: 0.9; }

  .container { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* SCORE CARDS */
  .score-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem;
    margin-bottom: 2.5rem;
  }
  .score-card {
    background: white; border-radius: 20px; padding: 1.5rem 1rem;
    border: 3px solid var(--escuro); box-shadow: var(--card-shadow);
    text-align: center;
  }
  .score-card .sc-icon { font-size: 2.2rem; display: block; margin-bottom: 0.4rem; }
  .score-card .sc-num {
    font-family: 'Baloo 2', cursive; font-size: 2.5rem; font-weight: 800; line-height: 1;
  }
  .score-card .sc-label { font-size: 0.85rem; color: #666; font-weight: 700; margin-top: 0.2rem; }
  .score-card:nth-child(1) .sc-num { color: var(--laranja); }
  .score-card:nth-child(2) .sc-num { color: var(--verde); }
  .score-card:nth-child(3) .sc-num { color: var(--roxo); }

  /* SECTION TITLE */
  .sec-title {
    font-family: 'Baloo 2', cursive; font-size: 1.6rem; font-weight: 800;
    margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
  }

  /* MEDAL CARDS */
  .medals-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 1.2rem; margin-bottom: 3rem;
  }
  .medal-card {
    background: white; border-radius: 20px; padding: 1.8rem 1rem;
    border: 3px solid var(--escuro); box-shadow: var(--card-shadow);
    text-align: center; transition: transform 0.2s;
  }
  .medal-card:hover { transform: translateY(-4px); }
  .medal-card.locked {
    opacity: 0.45; filter: grayscale(1);
  }
  .medal-card .mc-emoji { font-size: 3.2rem; display: block; margin-bottom: 0.8rem; }
  .medal-card h4 { font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800; margin-bottom: 0.4rem; }
  .medal-card p { font-size: 0.8rem; color: #666; line-height: 1.4; }
  .medal-card .mc-date {
    display: inline-block; margin-top: 0.8rem; padding: 0.2rem 0.8rem;
    background: var(--amarelo); border-radius: 20px; font-size: 0.85rem;
    font-weight: 800; color: var(--escuro); border: 1.5px solid var(--escuro);
  }
  .medal-card .mc-locked-label {
    display: inline-block; margin-top: 0.8rem; padding: 0.2rem 0.8rem;
    background: #eee; border-radius: 20px; font-size: 0.85rem;
    font-weight: 800; color: #999; border: 1.5px solid #ccc;
  }
  .medal-card.unlocked { border-color: var(--amarelo); box-shadow: 0 6px 0 rgba(255,217,61,0.4); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 3rem 2rem;
    background: white; border-radius: 20px; border: 3px dashed #ddd;
  }
  .empty-state .es-icon { font-size: 4rem; display: block; margin-bottom: 1rem; }
  .empty-state h3 { font-family: 'Baloo 2', cursive; font-size: 1.4rem; margin-bottom: 0.5rem; }
  .empty-state p { color: #666; margin-bottom: 1.5rem; }

  .btn-go {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--verde); color: white; border: none; border-radius: 30px;
    padding: 0.7rem 1.8rem; font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 0 #04a07a; transition: all 0.2s; text-decoration: none;
  }
  .btn-go:hover { transform: translateY(-2px); }

  .btn-reset {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: #f8d7da; color: #721c24; border: 2px solid #dc3545; border-radius: 30px;
    padding: 0.5rem 1.2rem; font-family: 'Baloo 2', cursive; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 1rem;
  }
  .btn-reset:hover { background: #dc3545; color: white; }

  footer {
    background: var(--escuro); color: rgba(255,255,255,0.7);
    text-align: center; padding: 2rem; font-size: 0.9rem; margin-top: 3rem;
  }
  footer strong { color: var(--amarelo); }


  /* === HAMBURGER MENU === */
  .hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer;
    background: none; border: none; padding: 0.5rem;
  }
  .hamburger span {
    display: block; width: 26px; height: 3px;
    background: white; border-radius: 3px; transition: all 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

  @media (max-width: 600px) {
    .hamburger { display: flex; }
    .nav-links {
      display: none; position: absolute; top: 70px; left: 0; right: 0;
      background: var(--escuro); flex-direction: column; align-items: stretch;
      padding: 0.8rem; gap: 0.3rem;
      border-top: 3px solid var(--amarelo); box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      z-index: 99;
    }
    .nav-links.open { display: flex; }
    .nav-links a { display: block; padding: 0.8rem 1rem; border-radius: 12px; font-size: 1rem; }
    .score-grid { grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
    .score-card .sc-num { font-size: 1.8rem; }
    .medals-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">🖥️ Tech<span>Kids</span></a>
  <button class="hamburger" onclick="toggleNav()" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-links">
    <a href="index.html">🏠 Início</a>
    <a href="aulas.html">📚 Aulas</a>
    <a href="atividades.html">🎮 Atividades</a>
    <a href="glossario.html">📖 Glossário</a>
    <a href="conquistas.html" class="active">🏆 Conquistas</a>
    <a href="sobre.html">ℹ️ Sobre</a>
  </div>
</nav>

<div class="page-header">
  <h1>🏆 Minhas Conquistas</h1>
  <p>Veja sua pontuação e as medalhas que você conquistou!</p>
</div>

<div class="container">

  <!-- SCORE CARDS -->
  <div class="score-grid">
    <div class="score-card">
      <span class="sc-icon">⭐</span>
      <div class="sc-num" id="sc-pts">0</div>
      <div class="sc-label">Pontos</div>
    </div>
    <div class="score-card">
      <span class="sc-icon">✅</span>
      <div class="sc-num" id="sc-acertos">0</div>
      <div class="sc-label">Acertos</div>
    </div>
    <div class="score-card">
      <span class="sc-icon">🏅</span>
      <div class="sc-num" id="sc-medals">0</div>
      <div class="sc-label">Medalhas</div>
    </div>
  </div>

  <!-- MEDALS -->
  <div class="sec-title">🏅 Medalhas</div>
  <div class="medals-grid" id="medalsGrid"></div>

  <div style="text-align:center; margin-top: 1rem;">
    <a href="atividades.html" class="btn-go">🎮 Jogar Atividades</a>
    <br>
    <button class="btn-reset" onclick="confirmReset()">🗑️ Resetar Progresso</button>
  </div>

</div>

<footer>
  <p>🖥️ <strong>TechKids</strong> • 2025</p>
</footer>

<script>
  // Todas as medalhas possíveis
  const allMedals = [
    { emoji: '🌟', name: 'Gênio do Computador',   desc: 'Acerte todas as perguntas do Quiz do Módulo 1' },
    { emoji: '✅', name: 'Detetive do Computador', desc: 'Acerte todos os Verdadeiro ou Falso do Módulo 1' },
    { emoji: '🖥️', name: 'Mestre das Peças',      desc: 'Complete o jogo de ligar do Módulo 1' },
    { emoji: '⚡', name: 'Craque do Teclado',     desc: 'Acerte todas as perguntas do Quiz do Módulo 2' },
    { emoji: '🎹', name: 'Dedo de Ouro',           desc: 'Acerte todos os Verdadeiro ou Falso do Módulo 2' },
    { emoji: '⌨️', name: 'Rei dos Atalhos',        desc: 'Complete o jogo de ligar do Módulo 2' },
    { emoji: '🔒', name: 'Guardião da Net',        desc: 'Acerte todas as perguntas do Quiz do Módulo 3' },
    { emoji: '🛡️', name: 'Protetor Digital',       desc: 'Acerte todos os Verdadeiro ou Falso do Módulo 3' },
    { emoji: '🌐', name: 'Navegador Seguro',       desc: 'Complete o jogo de ligar do Módulo 3' },
    { emoji: '🖌️', name: 'Artista Digital',        desc: 'Acerte todas as perguntas do Quiz do Módulo 4' },
    { emoji: '📂', name: 'Organizador Master',     desc: 'Acerte todos os Verdadeiro ou Falso do Módulo 4' },
    { emoji: '🎨', name: 'Criador Digital',        desc: 'Complete o jogo de ligar do Módulo 4' },
    { emoji: '🤖', name: 'Especialista em IA',     desc: 'Acerte todas as perguntas do Quiz do Módulo 5' },
    { emoji: '💡', name: 'Pensador do Futuro',      desc: 'Acerte todos os Verdadeiro ou Falso do Módulo 5' },
    { emoji: '🚀', name: 'Explorador Digital',      desc: 'Complete o jogo de ligar do Módulo 5' },
  ];

  function loadData() {
    const data = JSON.parse(localStorage.getItem('techkids') || '{}');
    const earnedMedals = data.medals || [];

    document.getElementById('sc-pts').textContent     = data.totalScore   || 0;
    document.getElementById('sc-acertos').textContent = data.correctCount || 0;
    document.getElementById('sc-medals').textContent  = earnedMedals.length;

    const grid = document.getElementById('medalsGrid');
    grid.innerHTML = '';

    allMedals.forEach(m => {
      const earned = earnedMedals.find(e => e.name === m.name);
      const card = document.createElement('div');
      card.className = 'medal-card ' + (earned ? 'unlocked' : 'locked');
      card.innerHTML = `
        <span class="mc-emoji">${m.emoji}</span>
        <h4>${m.name}</h4>
        <p>${earned ? earned.desc : m.desc}</p>
        ${earned
          ? `<span class="mc-date">📅 ${earned.date}</span>`
          : `<span class="mc-locked-label">🔒 Bloqueada</span>`}
      `;
      grid.appendChild(card);
    });
  }

  function confirmReset() {
    if (confirm('Tem certeza que quer apagar todo o seu progresso?')) {
      localStorage.removeItem('techkids');
      loadData();
    }
  }

  loadData();
</script>
</body>
</html>
